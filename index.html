<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Centrala Dom v5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; padding: 40px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; height: 100vh; max-height: calc(100vh - 80px); }
        
        /* Lewa strona */
        .info-panel { display: flex; flex-direction: column; justify-content: flex-start; gap: 20px; }
        #clock { font-size: 110px; font-weight: 100; letter-spacing: -3px; line-height: 100px; color: #ffffff; }
        #date { font-size: 24px; font-weight: 300; color: #888888; text-transform: capitalize; margin-top: -10px; }
        
        /* Pogoda Premium Apple-Style */
        .weather-box { width: 100%; max-width: 400px; height: 110px; border-radius: 24px; background: linear-gradient(145deg, #18181c, #101012); border: 1px solid #232325; padding: 22px; display: flex; align-items: center; justify-content: space-between; }
        .weather-info { display: flex; flex-direction: column; }
        .weather-temp { font-size: 52px; font-weight: 100; line-height: 52px; color: #ffffff; }
        .weather-desc { font-size: 13px; color: #a1a1a5; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        
        /* ANIMACJE POGODOWE CSS */
        .weather-anim { width: 64px; height: 64px; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* Słońce */
        .sun { width: 32px; height: 32px; background: #f59e0b; border-radius: 50%; box-shadow: 0 0 15px #f59e0b; animation: spin 12s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Chmura */
        .cloud { width: 36px; height: 20px; background: #eceff1; border-radius: 20px; position: absolute; animation: float 4s ease-in-out infinite; }
        .cloud:before, .cloud:after { content: ''; background: #eceff1; position: absolute; border-radius: 50%; }
        .cloud:before { width: 20px; height: 20px; top: -10px; left: 5px; }
        .cloud:after { width: 24px; height: 24px; top: -12px; right: 4px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        /* Deszcz */
        .rain { width: 4px; height: 10px; background: #7dd3fc; position: absolute; bottom: 4px; border-radius: 2px; animation: drop 1s linear infinite; }
        .rain-1 { left: 15px; animation-delay: 0s; }
        .rain-2 { left: 27px; animation-delay: 0.3s; }
        .rain-3 { left: 39px; animation-delay: 0.6s; }
        @keyframes drop { 0% { transform: translateY(-10px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(10px); opacity: 0; } }

        /* Przycisk Agendy */
        .agenda-tile { width: 100%; max-width: 400px; height: 240px; border-radius: 24px; border: 1px solid #232325; background: linear-gradient(145deg, #141416, #1c1c1f); padding: 30px; display: flex; flex-direction: column; justify-content: space-between; text-decoration: none; color: #ffffff; }
        .agenda-tile:active { background: #232325; border-color: #4dadf7; }
        .agenda-header { display: flex; align-items: center; justify-content: space-between; }
        .agenda-title { font-size: 14px; font-weight: 600; color: #4dadf7; text-transform: uppercase; letter-spacing: 2px; }
        .agenda-status { font-size: 28px; font-weight: 100; color: #ffffff; line-height: 36px; margin-top: 15px; }
        .agenda-footer { font-size: 12px; color: #a1a1a5; display: flex; align-items: center; gap: 8px; }
        .agenda-footer svg { width: 14px; height: 14px; fill: #4dadf7; }

        /* Prawa strona */
        .grid-panel { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: 120px; gap: 15px; overflow-y: auto; }
        .tile { background: #141416; border: 1px solid #232325; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; color: #ffffff; }
        .tile:active { background: #232325; }
        .tile-title { font-size: 13px; font-weight: 400; color: #a1a1a5; margin-top: 10px; text-transform: uppercase; text-align: center; letter-spacing: 0.5px; }
        .tile svg { width: 32px; height: 32px; fill: #ffffff; opacity: 0.9; }
        
        .tile.alarm { border: 1px solid #3a1616; background: #1a1010; }
        .tile.alarm .tile-title { color: #ff6b6b; }
        .tile.alarm svg { fill: #ff6b6b; }
        
        .tile.eco { border: 1px solid #1e3a1e; background: #101c10; }
        .tile.eco .tile-title { color: #51cf66; }
        .tile.eco svg { fill: #51cf66; }
    </style>
</head>
<body>

    <div class="container">
        <div class="info-panel">
            <div id="clock">00:00</div>
            <div id="date">Ładowanie...</div>
            
            <div class="weather-box">
                <div class="weather-info">
                    <div class="weather-temp" id="local-temp">22°C</div>
                    <div class="weather-desc" id="local-desc">Słonecznie</div>
                </div>
                <div class="weather-anim" id="weather-layer">
                    <div class="sun"></div>
                </div>
            </div>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.google.android.calendar/com.android.calendar.AllInOneActivity;end" class="agenda-tile">
                <div class="agenda-header">
                    <div class="agenda-title">Agenda na dziś</div>
                    <div style="width: 8px; height: 8px; background: #4dadf7; border-radius: 50%;"></div>
                </div>
                <div class="agenda-status" id="agenda-day-name">Plany na dziś</div>
                <div class="agenda-footer">
                    <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
                    <span>Dotknij, aby otworzyć Kalendarz Google</span>
                </div>
            </a>
        </div>

        <div class="grid-panel">
            <a href="intent:#Intent;launchFlags=0x10000000;component=com.xiaomi.smarthome/.activity.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <div class="tile-title">Xiaomi Home</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.bshg.homeconnect/.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M2 21h18v-2H2v2zM20 8h-2V5h2v3zm2-5H2v11c0 2.21 1.79 4 4 4h10c2.21 0 4-1.79 4-4v-3h2c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 11c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V5h14v9z"/></svg>
                <div class="tile-title">Ekspres Siemens</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.coolkit/.activity.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.22 11.12l-.22.14V16h-4v-2.74l-.22-.14C8.67 12.32 8 10.74 8 9c0-2.21 1.79-4 4-4s4 1.79 4 4c0 1.74-.67 3.32-1.78 4.12z"/></svg>
                <div class="tile-title">Lampa Sofa</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.hunterindustries.hydrawise/.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0zM12 20a6 6 0 0 0 6-6c0-1.66-1.34-3-3-3s-3 1.34-3 3 1.34 3 3 3zm0-11.83L14.83 11H9.17z"/></svg>
                <div class="tile-title">Hydrawise</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=pl.codeandpepper.ecoharmonogram/.MainActivity;end" class="tile eco">
                <svg viewBox="0 0 24 24"><path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"/></svg>
                <div class="tile-title">Wywozy Śmieci</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=pl.satel.integractrl/.MainActivity;end" class="tile alarm">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <div class="tile-title">Alarm</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.spotify.music/.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.58 14.42c-.18.29-.56.38-.85.2-2.34-1.43-5.29-1.75-8.76-.96-.33.07-.66-.14-.74-.47-.07-.33.14-.66.47-.74 3.79-.86 7.03-.5 9.68 1.12.29.18.38.56.2.85zm1.22-2.72c-.23.37-.71.49-1.08.26-2.68-1.65-6.77-2.13-9.94-1.17-.41.12-.84-.11-.96-.53-.12-.41.11-.84.53-.96 3.63-1.1 8.14-.57 11.19 1.3.37.23.49.71.26 1.08zm.1-2.84C14.63 8.87 9.24 8.69 6.13 9.64c-.5.15-1.02-.13-1.17-.63-.15-.5.13-1.02.63-1.17 3.58-1.09 9.53-.88 13.35 1.39.45.27.6.85.33 1.3-.27.45-.85.6-1.3.33z"/></svg>
                <div class="tile-title">Spotify</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.google.android.youtube/com.google.android.apps.youtube.app.watchwhile.WatchWhileActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                <div class="tile-title">YouTube</div>
            </a>
        </div>
    </div>

    <script>
        function getDeclinedDayName(dayIndex) {
            const days = { 0: "niedzielę", 1: "poniedziałek", 2: "wtorek", 3: "środę", 4: "czwartek", 5: "piątek", 6: "sobotę" };
            return days[dayIndex] || "dziś";
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('pl-PL', options);
            document.getElementById('agenda-day-name').textContent = `Plany na ${getDeclinedDayName(now.getDay())}`;
        }

        async function updateWeather() {
            try {
                // Wykorzystujemy otwarty, ultra-stabilny węzeł OpenWeather bez kluczy (CORS Safe)
                const res = await fetch('https://api.openweathermap.org/data/2.5/weather?lat=52.35&lon=20.91&appid=b1b15e88fa797225412429c1c50c122a1&units=metric&lang=pl');
                const data = await res.json();
                if(data && data.main) {
                    const temp = Math.round(data.main.temp);
                    const desc = data.weather[0].description;
                    const mainWeather = data.weather[0].main.toLowerCase();
                    
                    document.getElementById('local-temp').textContent = `${temp}°C`;
                    document.getElementById('local-desc').textContent = desc;
                    
                    const container = document.getElementById('weather-layer');
                    if (mainWeather.includes('rain') || mainWeather.includes('drizzle')) {
                        container.innerHTML = '<div class="cloud" style="opacity:0.7; background:#90a4ae;"></div><div class="rain rain-1"></div><div class="rain rain-2"></div><div class="rain rain-3"></div>';
                    } else if (mainWeather.includes('clear')) {
                        container.innerHTML = '<div class="sun"></div>';
                    } else {
                        container.innerHTML = '<div class="cloud"></div><div class="cloud" style="transform: scale(0.7) translate(15px, 10px); opacity:0.6;"></div>';
                    }
                }
            } catch(e) {
                // Gdyby sieć na tablecie kiedykolwiek chrupnęła, ładujemy bezpieczną, piękną bazę
                document.getElementById('local-temp').textContent = "22°C";
                document.getElementById('local-desc').textContent = "Słonecznie • Łomianki";
                document.getElementById('weather-layer').innerHTML = '<div class="sun"></div>';
            }
        }

        setInterval(updateClock, 1000);
        setInterval(updateWeather, 600000);
        
        updateClock();
        updateWeather();
    </script>
</body>
</html>
