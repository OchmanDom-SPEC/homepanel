<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Centrala Dom v2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; padding: 40px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; height: 100vh; max-height: calc(100vh - 80px); }
        
        /* Lewa strona */
        .info-panel { display: flex; flex-direction: column; justify-content: flex-start; gap: 20px; }
        #clock { font-size: 110px; font-weight: 100; letter-spacing: -3px; line-height: 100px; color: #ffffff; }
        #date { font-size: 24px; font-weight: 300; color: #888888; text-transform: capitalize; margin-top: -10px; }
        
        /* Pogoda Premium Style */
        .weather-box { width: 100%; max-width: 400px; border-radius: 24px; background: linear-gradient(145deg, #18181c, #101012); border: 1px solid #232325; padding: 22px; display: flex; align-items: center; justify-content: space-between; }
        .weather-info { display: flex; flex-direction: column; }
        .weather-temp { font-size: 52px; font-weight: 100; line-height: 52px; color: #ffffff; }
        .weather-desc { font-size: 13px; color: #a1a1a5; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .weather-icon-box { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }

        /* Multikalendarz Container */
        .agenda-container { width: 100%; max-width: 400px; height: 240px; border-radius: 24px; overflow: hidden; border: 1px solid #232325; background: #141416; }
        .agenda-container iframe { width: 100%; height: 100%; border: none; filter: invert(90%) hue-rotate(180deg); opacity: 0.85; }

        /* Prawa strona */
        .grid-panel { display: grid; grid-template-columns: repeat(2, 1fr); grid-auto-rows: 120px; gap: 15px; overflow-y: auto; }
        .tile { background: #141416; border: 1px solid #232325; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; color: #ffffff; }
        .tile:active { background: #232325; }
        .tile-title { font-size: 13px; font-weight: 400; color: #a1a1a5; margin-top: 10px; text-transform: uppercase; text-align: center; letter-spacing: 0.5px; }
        .tile svg { width: 32px; height: 32px; fill: #ffffff; opacity: 0.9; }
        
        .tile.alarm { border: 1px solid #3a1616; background: #1a1010; }
        .tile.alarm .tile-title { color: #ff6b6b; }
        .tile.alarm svg { fill: #ff6b6b; }
        
        .tile.eco { border: 1px solid #1e3a1e; background: #101c10; }
        .tile.eco .tile-title { color: #51cf66; }
        .tile.eco svg { fill: #51cf66; }
    </style>
</head>
<body>

    <div class="container">
        <div class="info-panel">
            <div id="clock">00:00</div>
            <div id="date">Ładowanie...</div>
            
            <div class="weather-box">
                <div class="weather-info">
                    <div class="weather-temp" id="local-temp">--°C</div>
                    <div class="weather-desc" id="local-desc">Pobieranie...</div>
                </div>
                <div class="weather-icon-box" id="weather-icon"></div>
            </div>

            <div class="agenda-container">
                <iframe src="https://calendar.google.com/calendar/embed?height=240&wkst=2&bgcolor=%23141416&ctz=Europe%2FWarsaw&mode=AGENDA&showTitle=0&showNav=0&showDate=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0&src=ZC5vY2htYW4ub21lbkBnbWFpbC5jb20&src=bWFsZ29yemF0YXRrYWN6eW9jaG1hbkBnbWFpbC5jb20&src=ZDU4Z2RtMzluyzZnYWhrZ2d1ZzMwc2ZvdG9AZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=YzI4ZDdlZWNlYzY5YTA5YWFiOTRlN2MzYzRiY2MzMWEzZjg5ZWJmMmY0OGYzYWI5MmM2Mjd3ZTJmMDY4NDE3ZkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t&src=OTlhNWVlODRjYWE0NjkzNTE5NTYzMjAxNGM3MThjOGQxZTFjZmViMWU3YThmMWY5NzkxOTRjYWQ0MTlhZGY4ZUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t" style="border-width:0" frameborder="0" scrolling="no"></iframe>
            </div>
        </div>

        <div class="grid-panel">
            <a href="intent:#Intent;launchFlags=0x10000000;component=com.xiaomi.smarthome/.activity.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                <div class="tile-title">Xiaomi Home</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.bshg.homeconnect/.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M2 21h18v-2H2v2zM20 8h-2V5h2v3zm2-5H2v11c0 2.21 1.79 4 4 4h10c2.21 0 4-1.79 4-4v-3h2c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 11c0 1.1 Winston-2 2H6c-1.1 0-2-.9-2-2V5h14v9z"/></svg>
                <div class="tile-title">Ekspres Siemens</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.coolkit/.activity.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.22 11.12l-.22.14V16h-4v-2.74l-.22-.14C8.67 12.32 8 10.74 8 9c0-2.21 1.79-4 4-4s4 1.79 4 4c0 1.74-.67 3.32-1.78 4.12z"/></svg>
                <div class="tile-title">Lampa Sofa</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.hunterindustries.hydrawise/.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0zM12 20a6 6 0 0 0 6-6c0-1.66-1.34-3-3-3s-3 1.34-3 3 1.34 3 3 3zm0-11.83L14.83 11H9.17z"/></svg>
                <div class="tile-title">Hydrawise</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=pl.codeandpepper.ecoharmonogram/.MainActivity;end" class="tile eco">
                <svg viewBox="0 0 24 24"><path d="M16 9v10H8V9h8m-1.5-6h-5l-1 1H5v2h14V4h-3.5l-1-1zM18 7H6v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7z"/></svg>
                <div class="tile-title">Wywozy Śmieci</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=pl.satel.integractrl/.MainActivity;end" class="tile alarm">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <div class="tile-title">Alarm</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.spotify.music/.MainActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.894-.982-.336.074-.67-.14-.744-.477-.074-.336.14-.67.477-.743 3.856-.88 7.15-.51 9.813 1.12.296.183.387.568.208.865z"/></svg>
                <div class="tile-title">Spotify</div>
            </a>

            <a href="intent:#Intent;launchFlags=0x10000000;component=com.google.android.youtube/com.google.android.apps.youtube.app.watchwhile.WatchWhileActivity;end" class="tile">
                <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                <div class="tile-title">YouTube</div>
            </a>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('pl-PL', options);
        }

        async function updateWeather() {
            try {
                // Konfiguracja stacji dla współrzędnych Łomianek Dolnych (52.35, 20.91)
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=52.35&longitude=20.91&current_weather=true');
                const data = await res.json();
                if(data && data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    document.getElementById('local-temp').textContent = `${temp}°C`;
                    
                    const code = data.current_weather.weathercode;
                    let desc = "Słonecznie";
                    let iconSvg = '<svg width="56" height="56" viewBox="0 0 24 24" fill="#ff9f43"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3 3 1.35 3 3-1.35 3-3 3zm0-10V3M12 21v-2M5.64 5.64l1.41 1.41M16.95 16.95l1.41 1.41M3 12h2M19 12h2M7.05 16.95l-1.41 1.41M18.36 5.64l-1.41 1.41"/></svg>';
                    
                    if(code >= 1 && code <= 3) {
                        desc = "Zachmurzenie";
                        iconSvg = '<svg width="56" height="56" viewBox="0 0 24 24" fill="#a1a1a5"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96z"/></svg>';
                    } else if(code >= 51) {
                        desc = "Opady deszczu";
                        iconSvg = '<svg width="56" height="56" viewBox="0 0 24 24" fill="#4dadf7"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zm-4 0c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1zm-4 0c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1z"/></svg>';
                    }
                    document.getElementById('local-desc').textContent = desc;
                    document.getElementById('weather-icon').innerHTML = iconSvg;
                }
            } catch(e) {
                document.getElementById('local-desc').textContent = "Błąd stacji";
            }
        }

        setInterval(updateClock, 1000);
        setInterval(updateWeather, 900000);
        updateClock();
        updateWeather();
    </script>
</body>
</html>
